<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>SHA-512 GUI App</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <div class="sidebar">
            <h3>Hash Tools</h3>
            <ul class="algo-list">
                <li class="disabled">MD5</li>
                <li class="disabled">SHA-1</li>
                <li class="disabled">SHA-256</li>
                <li class="active">SHA-512</li>
                <li class="disabled">Keccak</li>
            </ul>
        </div>

        <div class="settings">
            <button id="btn-hash" class="btn-primary">Hash!</button>
            
            <div class="setting-group">
                <label>Input Mode</label>
                <select id="input-mode">
                    <option value="text">Text (UTF-8)</option>
                    <option value="file">File (Local Disk)</option>
                </select>
            </div>

            <div class="setting-group">
                <label>Output Encoding</label>
                <select id="output-encoding">
                    <option value="hex_lower">Hex (Lower Case)</option>
                    <option value="hex_upper">Hex (Upper Case)</option>
                    <option value="base64">Base64</option>
                </select>
            </div>
        </div>

        <div class="main-content">
            <div class="box">
                <div class="box-header">Input</div>
                
                <textarea id="input-text" placeholder="Enter your text here..."></textarea>
                
                <div id="input-file-container" style="display: none; padding: 20px; flex: 1; flex-direction: column; justify-content: center; align-items: center; background: #fcfcfc;">
                    <input type="file" id="file-selector" style="margin-bottom: 15px;">
                    <p id="file-path-display" style="font-size: 13px; color: #666; word-break: break-all; text-align: center;"></p>
                </div>

                <div id="progress-container" style="display: none; padding: 15px; background: #fff; border-top: 1px solid #ddd;">
                    <div style="display: flex; justify-content: space-between; font-size: 12px; margin-bottom: 5px; color: #555; font-weight: 600;">
                        <span>Hashing Progress:</span>
                        <span id="progress-text">0%</span>
                    </div>
                    <div style="width: 100%; background-color: #eee; border-radius: 4px; height: 10px; overflow: hidden;">
                        <div id="progress-bar" style="width: 0%; height: 100%; background-color: #1a73e8; transition: width 0.1s;"></div>
                    </div>
                </div>

            </div>
            <div class="box">
                <div class="box-header">Output (Result)</div>
                <textarea id="output-text" readonly placeholder="Result will appear here..."></textarea>
            </div>
        </div>
    </div>

    <script src="renderer.js"></script>
</body>
</html>
